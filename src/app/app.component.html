<div class="layout">
  <header class="layout__header">
    <div class="layout__brand">
      <span class="layout__logo" aria-hidden="true">🏋️</span>
      <div>
        <h1 class="layout__title">Bamboo Leaf Studio</h1>
        <p class="layout__tagline">Reservas de clases del gimnasio</p>
      </div>
    </div>
  </header>

  <main class="layout__main">
    @if (selectedBooking(); as booking) {
      <app-booking-detail
        [selectedBooking]="booking"
        (back)="onBackToList()"
      />
    } @else {
      <app-booking-list (bookingSelected)="onBookingSelected($event)" />
    }
  </main>

  <footer class="layout__footer">
    <small>Demo técnica</small>
  </footer>
</div>
